<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f2e2a;
            --paper: #eef7f6;
            --gold: #2a9d8f;
            --gold-light: #52c4b6;
            --muted: #4a7a74;
            --border: #b2d8d4;
            --glass: rgba(238, 247, 246, 0.6);
        }

        body {
            min-height: 100vh;
            display: flex;
            font-family: 'DM Sans', sans-serif;
            background: #d0eeeb;
            overflow: hidden;
            position: relative;
        }

        /* Left decorative panel */
        .panel-left {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background: linear-gradient(145deg, #0d3b35 0%, #0f2e2a 60%, #092520 100%);
            overflow: hidden;
        }

        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(42,157,143,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(82,196,182,0.10) 0%, transparent 60%);
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(42,157,143,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42,157,143,0.07) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .brand-area {
            position: relative;
            z-index: 2;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border: 1.5px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 48px;
            position: relative;
            animation: fadeSlideUp 0.8s ease both;
        }

        .brand-mark::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(184,154,90,0.3);
        }

        .brand-mark svg {
            width: 20px;
            height: 20px;
            fill: var(--gold);
        }

        .panel-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 3.5vw, 3.4rem);
            font-weight: 300;
            color: var(--paper);
            line-height: 1.15;
            letter-spacing: -0.01em;
            margin-bottom: 24px;
            animation: fadeSlideUp 0.8s 0.1s ease both;
        }

        .panel-tagline em {
            font-style: italic;
            color: var(--gold-light);
        }

        .panel-desc {
            font-size: 0.88rem;
            color: rgba(245,240,232,0.45);
            line-height: 1.7;
            max-width: 320px;
            font-weight: 300;
            letter-spacing: 0.01em;
            animation: fadeSlideUp 0.8s 0.2s ease both;
        }

        .panel-divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 32px 0;
            opacity: 0.6;
            animation: fadeSlideUp 0.8s 0.3s ease both;
        }

        .panel-stats {
            display: flex;
            gap: 40px;
            animation: fadeSlideUp 0.8s 0.4s ease both;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .stat-label {
            font-size: 0.72rem;
            color: rgba(245,240,232,0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Decorative corner elements */
        .corner-deco {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 120px;
            height: 120px;
            opacity: 0.08;
        }

        .corner-deco svg { width: 100%; height: 100%; }

        /* Right login panel */
        .panel-right {
            width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 52px;
            background: #eef7f6;
            position: relative;
            overflow: hidden;
        }

        .panel-right::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(42,157,143,0.08) 0%, transparent 70%);
        }

        .login-header {
            margin-bottom: 44px;
            animation: fadeSlideUp 0.7s 0.2s ease both;
        }

        .login-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .login-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 400;
            color: var(--ink);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .login-subtitle {
            font-size: 0.84rem;
            color: var(--muted);
            margin-top: 8px;
            font-weight: 300;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeSlideUp 0.7s ease both;
        }

        .field-group:nth-child(1) { animation-delay: 0.3s; }
        .field-group:nth-child(2) { animation-delay: 0.4s; }

        .field-label {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--border);
            display: flex;
            align-items: center;
            transition: color 0.2s;
            pointer-events: none;
        }

        .field-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid var(--border);
            background: #ffffff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--ink);
            outline: none;
            border-radius: 0;
            transition: border-color 0.25s, box-shadow 0.25s;
            -webkit-appearance: none;
        }

        .field-input::placeholder { color: #9e9e9e; font-weight: 300; }

        .field-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(42,157,143,0.12);
        }

        .field-input:focus ~ .field-icon,
        .field-wrap:focus-within .field-icon {
            color: var(--gold);
        }

        .field-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeSlideUp 0.7s 0.45s ease both;
        }

        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .custom-check {
            width: 16px;
            height: 16px;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
            flex-shrink: 0;
        }

        .custom-check input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            margin: 0;
        }

        .custom-check input:checked + .check-mark { opacity: 1; }

        .check-mark {
            width: 8px;
            height: 8px;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.15s;
        }

        .remember-label {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .forgot-link {
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.01em;
            position: relative;
            transition: color 0.2s;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .forgot-link:hover { color: var(--gold); }
        .forgot-link:hover::after { transform: scaleX(1); }

        .btn-login {
            margin-top: 8px;
            padding: 15px 24px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s;
            animation: fadeSlideUp 0.7s 0.5s ease both;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            transform: translateX(-101%);
            transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
        }

        .btn-login:hover::before { transform: translateX(0); }
        .btn-login:hover { color: #fff; }

        .btn-login span, .btn-arrow {
            position: relative;
            z-index: 1;
        }

        .btn-arrow {
            display: flex;
            transition: transform 0.3s;
        }

        .btn-login:hover .btn-arrow { transform: translateX(4px); }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(180, 50, 50, 0.06);
            border-left: 2px solid #c0392b;
            font-size: 0.82rem;
            color: #9b2c2c;
            animation: fadeSlideUp 0.4s ease both;
        }

        .divider-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeSlideUp 0.7s 0.55s ease both;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b8b0a4;
        }

        .register-prompt {
            text-align: center;
            font-size: 0.84rem;
            color: var(--muted);
            animation: fadeSlideUp 0.7s 0.6s ease both;
        }

        .register-link {
            color: var(--ink);
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }

        .register-link::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1.5px;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .register-link:hover::after { transform: scaleX(1); }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 820px) {
            .panel-left { display: none; }
            .panel-right { width: 100%; padding: 48px 32px; }
        }
    </style>
</head>
<body>

<!-- Left Decorative Panel -->
<div class="panel-left">
    <div class="grid-overlay"></div>

    <div class="brand-area">
        <div style="font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:600; color:#fff; letter-spacing:-0.02em; margin-bottom:48px;">
            Ex<span style="color:var(--gold);">Tracker</span>
        </div>

        <h1 class="panel-tagline">
            Where every<br>decision <em>matters</em>
        </h1>

        <div class="panel-divider"></div>


        <div class="panel-stats">



        </div>
    </div>

    <div class="corner-deco">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="58" stroke="#b89a5a" stroke-width="1"/>
            <circle cx="60" cy="60" r="44" stroke="#b89a5a" stroke-width="0.5"/>
            <circle cx="60" cy="60" r="30" stroke="#b89a5a" stroke-width="0.5"/>
            <line x1="2" y1="60" x2="118" y2="60" stroke="#b89a5a" stroke-width="0.5"/>
            <line x1="60" y1="2" x2="60" y2="118" stroke="#b89a5a" stroke-width="0.5"/>
        </svg>
    </div>
</div>

<!-- Right Login Panel -->
<div class="panel-right">
    <div class="login-header">
        <p class="login-eyebrow">Welcome back</p>
        <h2 class="login-title">Sign in to<br>your account</h2>
        <p class="login-subtitle">Enter your credentials to continue</p>
    </div>

    <form action="/login" method="post" class="login-form">

        <div class="field-group">
            <label class="field-label" for="email">Email Address</label>
            <div class="field-wrap">
                    <span class="field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                <input class="field-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
            </div>
        </div>

        <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-wrap">
                    <span class="field-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                <input class="field-input" type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
        </div>

       


        <!-- Error message (Thymeleaf conditional) -->
        <p style="color:#c0392b; font-size:0.82rem;" th:text="${error}"></p>

        <button type="submit" class="btn-login">
            <span>Continue</span>
            <span class="btn-arrow">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                    </svg>
                </span>
        </button>

        <div class="divider-wrap">
            <div class="divider-line"></div>
            <span class="divider-text">or</span>
            <div class="divider-line"></div>
        </div>

        <p class="register-prompt">
            Don't have an account?&nbsp;
            <a href="/register" class="register-link">Create one</a>
        </p>
    </form>
</div>

</body>
</html>

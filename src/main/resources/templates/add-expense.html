<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense — ExTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:       #f7f3ec;
            --cream-dark:  #ede7da;
            --forest:      #1c3a2f;
            --forest-mid:  #2a5444;
            --teal:        #2a9d8f;
            --teal-light:  #d6f0ed;
            --teal-mid:    #52c4b6;
            --gold:        #e9c46a;
            --ink:         #1a1a1a;
            --muted:       #6b7a74;
            --border:      #c8e0dc;
        }

        body {
            min-height: 100vh;
            font-family: 'Epilogue', sans-serif;
            background: var(--cream);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(42,157,143,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42,157,143,0.03) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none; z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 520px;
            background: #fff; border: 1px solid var(--border);
            border-radius: 2px; overflow: hidden;
            animation: fadeSlideUp 0.55s ease both;
            box-shadow: 0 20px 60px rgba(28,58,47,0.08), 0 4px 16px rgba(28,58,47,0.04);
        }

        .card-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--teal) 0%, var(--teal-mid) 60%, var(--gold) 100%);
        }

        .card-header {
            padding: 32px 36px 24px;
            border-bottom: 1px solid var(--cream-dark);
            display: flex; align-items: flex-start; justify-content: space-between;
        }

        .card-eyebrow {
            font-size: 0.65rem; letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--teal); font-weight: 600; margin-bottom: 6px;
        }

        .card-title {
            font-family: 'Fraunces', serif; font-size: 1.75rem; font-weight: 700;
            color: var(--forest); line-height: 1.1; letter-spacing: -0.02em;
        }

        .card-subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 5px; font-weight: 300; }

        .header-icon {
            width: 44px; height: 44px; background: var(--teal-light);
            border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .header-icon svg { width: 20px; height: 20px; color: var(--teal); }

        .card-body { padding: 28px 36px 36px; display: flex; flex-direction: column; gap: 20px; }

        .amount-group {
            background: var(--forest); border-radius: 2px; padding: 20px 24px;
            position: relative; overflow: hidden; animation: fadeSlideUp 0.55s 0.1s ease both;
        }

        .amount-group::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 100% 50%, rgba(42,157,143,0.15) 0%, transparent 70%);
        }

        .amount-label {
            font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
            color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 10px; position: relative;
        }

        .amount-input-wrap { display: flex; align-items: center; gap: 10px; position: relative; }

        .currency-symbol {
            font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 700;
            color: rgba(255,255,255,0.35); line-height: 1; flex-shrink: 0;
        }

        .amount-input {
            background: transparent; border: none; outline: none;
            font-family: 'Fraunces', serif; font-size: 2.4rem; font-weight: 700;
            color: #fff; width: 100%; letter-spacing: -0.02em; line-height: 1;
        }

        .amount-input::placeholder { color: rgba(255,255,255,0.2); }

        .amount-underline {
            position: absolute; bottom: -4px; left: 0; right: 0;
            height: 1px; background: rgba(255,255,255,0.15);
        }

        .amount-underline::after {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 0; background: var(--teal-mid); transition: width 0.4s ease;
        }

        .amount-group:focus-within .amount-underline::after { width: 100%; }

        .field-group { display: flex; flex-direction: column; gap: 8px; animation: fadeSlideUp 0.55s ease both; }
        .field-group:nth-child(2) { animation-delay: 0.15s; }
        .field-group:nth-child(3) { animation-delay: 0.2s; }
        .field-group:nth-child(4) { animation-delay: 0.25s; }

        .field-label {
            font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--muted); font-weight: 600;
        }

        .field-wrap { position: relative; }

        .field-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--border); display: flex; align-items: center;
            pointer-events: none; transition: color 0.2s;
        }

        .field-icon svg { width: 15px; height: 15px; }

        .field-input {
            width: 100%; padding: 13px 16px 13px 42px;
            border: 1.5px solid var(--border); background: #fff;
            font-family: 'Epilogue', sans-serif; font-size: 0.875rem; color: var(--ink);
            outline: none; border-radius: 2px;
            transition: border-color 0.25s, box-shadow 0.25s; -webkit-appearance: none;
        }

        .field-input::placeholder { color: #b0bab7; font-weight: 300; }

        .field-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(42,157,143,0.1); }
        .field-wrap:focus-within .field-icon { color: var(--teal); }

        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .btn-submit {
            margin-top: 4px; padding: 15px 24px;
            background: var(--forest); color: #fff; border: none;
            font-family: 'Epilogue', sans-serif; font-size: 0.8rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; border-radius: 2px; position: relative; overflow: hidden;
            transition: color 0.3s; animation: fadeSlideUp 0.55s 0.35s ease both;
        }

        .btn-submit::before {
            content: ''; position: absolute; inset: 0; background: var(--teal);
            transform: translateX(-101%); transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
        }

        .btn-submit:hover::before { transform: translateX(0); }
        .btn-submit span, .btn-submit svg { position: relative; z-index: 1; }
        .btn-arrow { display: flex; transition: transform 0.3s; }
        .btn-submit:hover .btn-arrow { transform: translateX(4px); }

        .back-link {
            margin-top: 20px; font-size: 0.75rem; color: var(--muted);
            text-decoration: none; display: flex; align-items: center; gap: 6px;
            transition: color 0.2s; animation: fadeSlideUp 0.55s 0.4s ease both;
            position: relative; z-index: 1;
        }

        .back-link:hover { color: var(--teal); }
        .back-link svg { width: 14px; height: 14px; }

        .brand-bar {
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
            animation: fadeSlideUp 0.55s ease both; position: relative; z-index: 1;
        }

        .brand-dot {
            width: 8px; height: 8px; background: var(--teal); border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(42,157,143,0.2);
        }

        .brand-name {
            font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700;
            color: var(--forest); letter-spacing: -0.02em;
        }

        .brand-name span { color: var(--teal); font-style: italic; }

        /* ── View Expenses Table ── */
        .table-card {
            width: 100%; max-width: 520px; position: relative; z-index: 1;
            background: #fff; border: 1px solid var(--border); border-radius: 2px;
            overflow: hidden; margin-top: 24px;
            box-shadow: 0 8px 32px rgba(28,58,47,0.06);
            animation: fadeSlideUp 0.55s 0.45s ease both;
        }

        .table-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--teal) 0%, var(--teal-mid) 60%, var(--gold) 100%);
        }

        .table-head {
            padding: 18px 24px 14px; border-bottom: 1px solid var(--cream-dark);
            display: flex; align-items: center; justify-content: space-between;
        }

        .table-title {
            font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; color: var(--forest);
        }

        .view-all-link {
            font-size: 0.7rem; color: var(--teal); text-decoration: none;
            letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600;
            transition: opacity 0.2s;
        }

        .view-all-link:hover { opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--cream); }

        thead th {
            padding: 10px 18px; text-align: left;
            font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border);
        }

        tbody tr { border-bottom: 1px solid var(--cream-dark); transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--cream); }

        tbody td { padding: 12px 18px; font-size: 0.8rem; color: var(--ink); vertical-align: middle; }

        .td-amount {
            font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; color: var(--forest);
        }

        .td-cat {
            display: inline-flex; align-items: center;
            background: var(--teal-light); color: var(--teal);
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
            text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
        }

        .td-date { color: var(--muted); font-size: 0.75rem; }
        .td-desc { color: var(--muted); font-style: italic; font-size: 0.75rem; }

        /* Empty state */
        .empty-state { padding: 36px 20px; text-align: center; }

        .empty-icon {
            width: 40px; height: 40px; background: var(--cream-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
        }

        .empty-icon svg { width: 18px; height: 18px; color: var(--muted); }
        .empty-title { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; color: var(--forest); margin-bottom: 4px; }
        .empty-sub { font-size: 0.75rem; color: var(--muted); }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card-header { padding: 24px 24px 20px; }
            .card-body { padding: 20px 24px 28px; }
            .field-row { grid-template-columns: 1fr; }
            .card-title { font-size: 1.4rem; }
            thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>

<!-- Brand bar -->
<div class="brand-bar">
    <span class="brand-dot"></span>
    <span class="brand-name">Ex<span>Tracker</span></span>
</div>

<!-- Add Expense Card -->
<div class="card">
    <div class="card-accent"></div>

    <div class="card-header">
        <div class="header-left">
            <p class="card-eyebrow">New Entry</p>
            <h1 class="card-title">Add Expense</h1>
            <p class="card-subtitle">Record a new expense to your tracker</p>
        </div>
        <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
                <line x1="6" y1="15" x2="10" y2="15"/>
            </svg>
        </div>
    </div>

    <div class="card-body">
        <form action="/expenses/add" method="post">

            <!-- Amount -->
            <div class="amount-group" style="margin-bottom:20px;">
                <div class="amount-label">Amount</div>
                <div class="amount-input-wrap">
                    <span class="currency-symbol" th:text="${currency}">$</span>
                    <input class="amount-input" type="number" name="amount" placeholder="0.00" min="0" step="0.01" required>
                    <div class="amount-underline"></div>
                </div>
            </div>

            <!-- Category -->
            <div class="field-group" style="margin-bottom:20px;">
                <label class="field-label" for="category">Category</label>
                <div class="field-wrap">
                    <span class="field-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                            <line x1="7" y1="7" x2="7.01" y2="7"/>
                        </svg>
                    </span>
                    <input class="field-input" type="text" id="category" name="category" placeholder="e.g. Food, Transport, Shopping…" required>
                </div>
            </div>

            <!-- Date & Description -->
            <div class="field-row" style="margin-bottom:20px;">
                <div class="field-group">
                    <label class="field-label" for="date">Date</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </span>
                        <input class="field-input" type="date" id="date" name="date" required>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="description">Description</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="17" y1="10" x2="3" y2="10"/>
                                <line x1="21" y1="6" x2="3" y2="6"/>
                                <line x1="21" y1="14" x2="3" y2="14"/>
                                <line x1="17" y1="18" x2="3" y2="18"/>
                            </svg>
                        </span>
                        <input class="field-input" type="text" id="description" name="description" placeholder="e.g. Lunch, Grab ride…">
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit">
                <span>Save Expense</span>
                <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>

        </form>
    </div>
</div>

<!-- View Expenses Button -->
<a href="/expenses" style="
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    padding: 14px 20px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    text-decoration: none;
    position: relative;
    z-index: 1;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeSlideUp 0.55s 0.5s ease both;"
   onmouseover="this.style.borderColor='var(--teal)'; this.style.boxShadow='0 0 0 3px rgba(42,157,143,0.1)';"
   onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none';">

    <div style="
        width: 38px; height: 38px;
        background: var(--teal-light);
        border-radius: 2px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
    </div>

    <div style="flex:1;">
        <div style="font-size:0.82rem; font-weight:600; color:var(--forest);">View Expense</div>
    </div>

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
    </svg>
</a>

<!-- Back link -->
<a href="/dashboard" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Dashboard
</a>

<script>
    const dateInput = document.getElementById('date');
    dateInput.value = new Date().toISOString().split('T')[0];
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Epilogue:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream:      #f7f3ec;
            --cream-dark: #ede7da;
            --forest:     #1c3a2f;
            --forest-mid: #2a5444;
            --teal:       #2a9d8f;
            --teal-light: #d6f0ed;
            --coral:      #e76f51;
            --coral-light:#fce8e2;
            --gold:       #e9c46a;
            --gold-light: #fdf5dc;
            --ink:        #1a1a1a;
            --muted:      #7a7060;
            --border:     #ddd7ca;
        }

        body {
            font-family: 'Epilogue', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .topnav {
            position: sticky; top: 0; z-index: 200;
            background: var(--forest);
            display: flex; align-items: center;
            height: 60px; padding: 0 40px; gap: 0;
            animation: fadeDown 0.5s ease both;
        }

        .nav-brand {
            font-family: 'Fraunces', serif;
            font-size: 1.25rem; font-weight: 700;
            color: #fff; letter-spacing: -0.02em;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }

        .nav-brand-dot {
            width: 8px; height: 8px;
            background: var(--teal); border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(42,157,143,0.25);
        }

        .nav-links {
            display: flex; align-items: center; gap: 2px; margin-left: 40px;
        }

        .nav-link {
            font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: rgba(255,255,255,0.45); text-decoration: none;
            padding: 6px 14px; border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-link:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.07); }
        .nav-link.active { color: #fff; background: rgba(42,157,143,0.2); }

        .nav-right {
            margin-left: auto; display: flex; align-items: center; gap: 16px;
        }

        .nav-date { font-size: 0.72rem; color: rgba(255,255,255,0.35); }

        .nav-avatar {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--forest-mid) 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 600; color: #fff; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .nav-signout {
            font-size: 0.72rem; color: rgba(255,255,255,0.4);
            text-decoration: none; letter-spacing: 0.04em;
            transition: color 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .nav-signout:hover { color: var(--coral); }
        .nav-signout svg { width: 13px; height: 13px; }

        .hero {
            background: var(--forest);
            padding: 52px 40px 48px;
            position: relative; overflow: hidden;
            animation: fadeSlideUp 0.6s 0.1s ease both;
        }

        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 80% at 100% 50%, rgba(42,157,143,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 0% 100%, rgba(233,196,106,0.07) 0%, transparent 60%);
        }

        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .hero-inner {
            position: relative; z-index: 2;
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: flex-end;
            justify-content: space-between; gap: 40px;
        }

        .hero-tag {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--teal); margin-bottom: 18px;
        }
        .hero-tag-line { width: 24px; height: 1px; background: var(--teal); }

        .hero-greeting {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 700; color: #fff;
            line-height: 1.08; letter-spacing: -0.02em; margin-bottom: 14px;
        }
        .hero-greeting em { font-style: italic; font-weight: 400; color: var(--gold); }

        .hero-sub {
            font-size: 0.85rem; color: rgba(255,255,255,0.4);
            font-weight: 300; max-width: 400px; line-height: 1.6;
        }

        .hero-right {
            display: flex; flex-direction: column;
            align-items: flex-end; gap: 12px; flex-shrink: 0;
        }

        .hero-checkmark {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.72rem; color: rgba(255,255,255,0.3);
        }
        .hero-checkmark svg { width: 14px; height: 14px; color: #4ade80; }

        .content {
            max-width: 1200px; margin: 0 auto;
            padding: 40px; display: flex; flex-direction: column; gap: 32px;
        }

        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; animation: fadeSlideUp 0.6s 0.2s ease both;
        }

        .stat-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 2px; padding: 24px;
            position: relative; overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s; cursor: default;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(28,58,47,0.1); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .stat-card.c1::before { background: var(--teal); }
        .stat-card.c2::before { background: var(--coral); }
        .stat-card.c3::before { background: var(--gold); }
        .stat-card.c4::before { background: var(--forest-mid); }

        .stat-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

        .stat-icon-wrap {
            width: 40px; height: 40px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
        }
        .stat-icon-wrap svg { width: 18px; height: 18px; }
        .stat-icon-wrap.teal   { background: var(--teal-light); color: var(--teal); }
        .stat-icon-wrap.coral  { background: var(--coral-light); color: var(--coral); }
        .stat-icon-wrap.gold   { background: var(--gold-light); color: #a07a10; }
        .stat-icon-wrap.forest { background: #d4e9e0; color: var(--forest-mid); }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2.1rem; font-weight: 500;
            color: var(--forest); line-height: 1; letter-spacing: -0.03em;
        }
        .stat-label { font-size: 0.73rem; color: var(--muted); margin-top: 4px; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1100px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .content { padding: 20px; }
            .hero { padding: 36px 20px 32px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .hero-right { display: none; }
            .nav-links { display: none; }
            .topnav { padding: 0 20px; }
        }
    </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
    <a class="nav-brand" href="/dashboard">
        <span class="nav-brand-dot"></span>
        ExTracker
    </a>
    <div class="nav-links">
        <a class="nav-link active" href="/dashboard">Overview</a>
        <a class="nav-link" href="/add-expense">Expense</a>
        <a class="nav-link" href="/add-income">Income</a>
        <a class="nav-link" href="/comparison">Comparison</a>
        <a class="nav-link" href="/reports">Reports</a>
        <a class="nav-link" href="/savings">Savings</a>
        <a class="nav-link" href="/settings">Settings</a>
    </div>
    <div class="nav-right">
        <span class="nav-date" id="navDate"></span>
        <div class="nav-avatar" id="navAvatar">–</div>
        <a class="nav-signout" href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
        </a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-grid"></div>
    <div class="hero-inner">
        <div class="hero-left">
            <div class="hero-tag"><span class="hero-tag-line"></span>Dashboard Overview</div>
            <h1 class="hero-greeting">
                Welcome back,<br>
                <em th:text="${name}" id="heroName">there</em>
            </h1>
            <p class="hero-sub">Everything looks great. Here's a snapshot of your Expenses.</p>
        </div>
        <div class="hero-right">
            <div class="hero-checkmark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Login successful
            </div>
        </div>
    </div>
</section>

<!-- MAIN CONTENT -->
<div class="content">

    <div class="stats-row">

        <!-- Total Savings -->
        <div class="stat-card c1">
            <div class="stat-top">
                <div class="stat-icon-wrap teal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="4" r="2.5"/>
                        <line x1="12" y1="2.5" x2="12" y2="5.5"/>
                        <path d="M10.8 3.5a1.2 1.2 0 0 1 2.4 0c0 .66-.54 1.2-1.2 1.2S10.8 5.16 10.8 5.82a1.2 1.2 0 0 0 2.4 0"/>
                        <line x1="12" y1="6.5" x2="12" y2="8.5" stroke-dasharray="1 1"/>
                        <rect x="3" y="9" width="18" height="12" rx="2"/>
                        <path d="M3 12h18"/>
                        <rect x="14" y="13.5" width="5" height="4" rx="1"/>
                        <line x1="10" y1="8.8" x2="14" y2="8.8"/>
                        <path d="M10 8.8 Q12 9.5 14 8.8"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${currency} + ${totalSavings}">$0.00</div>
            <div class="stat-label">Total Savings</div>
        </div>

        <!-- Revenue This Month -->
        <div class="stat-card c2">
            <div class="stat-top">
                <div class="stat-icon-wrap coral">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${currency} + ${monthIncome}">$0.00</div>
            <div class="stat-label">Revenue This Month</div>
        </div>

        <!-- Expense This Month -->
        <div class="stat-card c3">
            <div class="stat-top">
                <div class="stat-icon-wrap gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${currency} + ${monthExpense}">$0.00</div>
            <div class="stat-label">Expense This Month</div>
        </div>

        <!-- Total Reports -->
        <div class="stat-card c4">
            <div class="stat-top">
                <div class="stat-icon-wrap forest">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${totalReports}">0</div>
            <div class="stat-label">Total Reports</div>
        </div>

    </div>

</div>

<script>
    const d = new Date();
    const el = document.getElementById('navDate');
    if (el) el.textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    const nameEl = document.getElementById('heroName');
    const avatarEl = document.getElementById('navAvatar');
    if (nameEl && avatarEl) {
        const n = nameEl.textContent.trim();
        avatarEl.textContent = n && n !== 'there' ? n.charAt(0).toUpperCase() : '?';
    }
</script>

</body>
</html>
